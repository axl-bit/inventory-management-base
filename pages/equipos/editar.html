<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Equipo</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="lista.html">
      ← Equipos
    </a>
  </div>
</nav>

<div class="container mt-4">

  <div class="row justify-content-center">

    <div class="col-md-8">

      <div class="card shadow-sm">

        <!-- HEADER -->
        <div class="card-header bg-warning d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Editar Equipo</h5>

          <span class="badge bg-success">ID: 1</span>
        </div>

        <div class="card-body">

          <!-- INFO GENERAL -->
          <div class="row">

            <div class="col-md-6 mb-3">
              <label class="form-label">Nombre del equipo</label>
              <input type="text" class="form-control" value="Laptop Dell Latitude">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Marca</label>
              <input type="text" class="form-control" value="Dell">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Modelo</label>
              <input type="text" class="form-control" value="Latitude 5420">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Número de serie</label>
              <input type="text" class="form-control" value="DL-5420-99821">
            </div>

          </div>

          <hr>

          <!-- ESTADO -->
          <div class="row">

            <div class="col-md-6 mb-3">
              <label class="form-label">Estado</label>
              <select class="form-select">
                <option selected>Operativo</option>
                <option>Mantenimiento</option>
                <option>Inactivo</option>
                <option>De baja</option>
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Ubicación</label>
              <input type="text" class="form-control" value="Oficina Central">
            </div>

          </div>

          <!-- OBSERVACIONES -->
          <div class="mb-3">
            <label class="form-label">Observaciones</label>
            <textarea class="form-control" rows="3">
Equipo asignado al área de sistemas. En buen estado.
            </textarea>
          </div>

          <!-- FECHA -->
          <div class="mb-3">
            <label class="form-label">Fecha de registro</label>
            <input type="date" class="form-control" value="2026-04-14">
          </div>

        </div>

        <!-- FOOTER ACTIONS -->
        <div class="card-footer d-flex justify-content-end gap-2">

          <a href="lista.html" class="btn btn-secondary">
            Cancelar
          </a>

          <button class="btn btn-warning">
            <i class="bi bi-save"></i> Actualizar Equipo
          </button>

        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
