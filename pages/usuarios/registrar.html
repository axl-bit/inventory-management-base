<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar Usuario</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="lista.html">
      ← Usuarios
    </a>
  </div>
</nav>

<div class="container mt-4">

  <div class="row justify-content-center">

    <div class="col-md-7">

      <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">
            <i class="bi bi-person-plus"></i> Registrar Usuario
          </h5>
        </div>

        <div class="card-body">

          <!-- Nombre -->
          <div class="mb-3">
            <label class="form-label">Nombre completo</label>
            <input type="text" class="form-control" placeholder="Ej: Juan Pérez">
          </div>

          <!-- Usuario -->
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" class="form-control" placeholder="Ej: jperez">
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" placeholder="correo@empresa.com">
          </div>

          <div class="row">

            <!-- Rol -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Rol</label>
              <select class="form-select">
                <option>Administrador</option>
                <option>Usuario</option>
                <option>Soporte</option>
              </select>
            </div>

            <!-- Estado -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Estado</label>
              <select class="form-select">
                <option>Activo</option>
                <option>Inactivo</option>
              </select>
            </div>

          </div>

          <!-- Contraseña -->
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" placeholder="••••••••">
          </div>

          <!-- Confirmación -->
          <div class="mb-3">
            <label class="form-label">Confirmar contraseña</label>
            <input type="password" class="form-control" placeholder="••••••••">
          </div>

          <!-- Botones -->
          <div class="d-flex justify-content-end gap-2">

            <a href="lista.html" class="btn btn-secondary">
              Cancelar
            </a>

            <button class="btn btn-success">
              <i class="bi bi-check-circle"></i> Guardar Usuario
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
